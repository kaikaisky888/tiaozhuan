<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Go Page 独立后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#0b1220,#15243d);color:#eaf2ff;min-height:100vh;padding:24px}
.wrap{max-width:980px;margin:0 auto}
.panel{background:rgba(8,15,28,.78);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.title{font-size:28px;font-weight:700;margin-bottom:8px}
.subtitle{color:#8ea2c9;font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
.field{margin-bottom:18px}
label{display:block;font-size:13px;color:#9eb0d4;margin-bottom:8px}
input,textarea{width:100%;border:1px solid rgba(255,255,255,.1);background:#0f1a2d;color:#fff;border-radius:12px;padding:12px 14px;font-size:14px;outline:none}
textarea{min-height:120px;resize:vertical}
input:focus,textarea:focus{border-color:#4fd1c5;box-shadow:0 0 0 3px rgba(79,209,197,.12)}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
button{border:none;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:600;cursor:pointer}
.primary{background:linear-gradient(90deg,#23c4ed,#34d399);color:#052033}
.secondary{background:#1f2f4d;color:#dce8ff}
.status{margin-top:16px;font-size:14px;color:#9bd7b7;min-height:20px}
.hint{font-size:12px;color:#8296be;margin-top:6px;line-height:1.6}
.code{margin-top:20px;background:#09111e;border-radius:14px;padding:16px;white-space:pre-wrap;word-break:break-word;font-family:Consolas,monospace;font-size:12px;color:#cfe0ff}
.preview-list{width:100%;min-height:120px;border:1px solid rgba(255,255,255,.1);background:#0f1a2d;color:#d9e7ff;border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.toggle-row>label:first-child{margin-bottom:0;min-width:70px}
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#1f2f4d;border-radius:24px;transition:.3s}
.slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#8ea2c9;border-radius:50%;transition:.3s}
.switch input:checked+.slider{background:#34d399}
.switch input:checked+.slider::before{transform:translateX(20px);background:#fff}
.sec-hide{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="title">Go Page 独立后台</div>
    <div class="subtitle">这套后台只管理 go_page 的跳转配置，不和主程序后台混用。</div>

    <div class="grid">
      <div>
        <div class="field">
          <label for="siteName">站点名称</label>
          <input id="siteName" type="text" placeholder="例如：A 站跳转页">
        </div>
        <div class="toggle-row">
          <label>通配模式</label>
          <label class="switch"><input type="checkbox" id="wildcardEnabled" checked><span class="slider"></span></label>
          <span class="hint" style="margin:0">开启后随机生成子域名；关闭则用固定域名列表。</span>
        </div>
        <div id="wcFields">
        <div class="field">
          <label for="baseDomain">通配基础域名</label>
          <input id="baseDomain" type="text" placeholder="例如：a-hui-od.top">
          <div class="hint">生成的候选域名会是随机前缀 + 这里的基础域名，例如 abc12345.a-hui-od.top。</div>
        </div>
        <div class="grid">
          <div class="field">
            <label for="candidateCount">候选数量</label>
            <input id="candidateCount" type="number" min="1" max="50">
          </div>
          <div class="field">
            <label for="labelLength">随机前缀长度</label>
            <input id="labelLength" type="number" min="3" max="32">
          </div>
        </div>
        </div>
        <div class="field">
          <label for="assetThreshold">资源命中阈值</label>
          <input id="assetThreshold" type="number" min="1" max="20">
          <div class="hint">例如配置 3 个资源，阈值设 2，表示命中任意 2 个就认为像这个站。</div>
        </div>
      </div>

      <div>
        <div class="field">
          <label for="probeAssets">站点专属资源路径</label>
          <textarea id="probeAssets" placeholder="每行一个，例如：&#10;/static/index/img/down_left.png&#10;/static/mobile/imgn/coinwin_ico.png"></textarea>
          <div class="hint">这些路径必须是当前站点特有、能代表页面正常加载的资源。</div>
        </div>
        <div class="field" id="wcPreview">
          <label for="domainPreview">本次会生成的域名预览</label>
          <div class="preview-list" id="domainPreview"></div>
          <div class="hint">这里展示当前配置下会检测的具体 3 级域名示例，保存配置后前端会按同样规则生成并检测。</div>
        </div>
        <div class="field" id="fdFields">
          <label for="fixedDomains">固定域名列表</label>
          <textarea id="fixedDomains" placeholder="每行一个，格式：URL 或 URL,名称&#10;https://app.example.com&#10;https://m.example.com,移动线路"></textarea>
          <div class="hint">通配模式关闭时使用这些固定域名。每行一个 URL，可选逗号后加名称。</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="saveBtn">保存配置</button>
      <button class="secondary" id="reloadBtn">重新加载</button>
    </div>

    <div class="status" id="status"></div>
    <div class="code" id="jsonView"></div>
  </div>
</div>

<script>
(function(){
  var siteName = document.getElementById('siteName');
  var baseDomain = document.getElementById('baseDomain');
  var candidateCount = document.getElementById('candidateCount');
  var labelLength = document.getElementById('labelLength');
  var assetThreshold = document.getElementById('assetThreshold');
  var probeAssets = document.getElementById('probeAssets');
  var domainPreview = document.getElementById('domainPreview');
  var saveBtn = document.getElementById('saveBtn');
  var reloadBtn = document.getElementById('reloadBtn');
  var status = document.getElementById('status');
  var jsonView = document.getElementById('jsonView');
  var wildcardEnabled = document.getElementById('wildcardEnabled');
  var wcFields = document.getElementById('wcFields');
  var wcPreview = document.getElementById('wcPreview');
  var fdFields = document.getElementById('fdFields');
  var fixedDomains = document.getElementById('fixedDomains');

  function setStatus(text, isError){
    status.textContent = text || '';
    status.style.color = isError ? '#ff9b9b' : '#9bd7b7';
  }

  function toggleWildcard(){
    var on = wildcardEnabled.checked;
    wcFields.classList.toggle('sec-hide', !on);
    wcPreview.classList.toggle('sec-hide', !on);
    fdFields.classList.toggle('sec-hide', on);
  }
  wildcardEnabled.addEventListener('change', toggleWildcard);

  function linesToArray(text){
    return text.split(/\r?\n/).map(function(item){ return item.trim(); }).filter(Boolean);
  }

  function randomLabel(length){
    var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    var result = '';
    for(var i = 0; i < length; i++){
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  function refreshPreview(){
    var base = baseDomain.value.trim();
    var count = parseInt(candidateCount.value, 10) || 6;
    var length = parseInt(labelLength.value, 10) || 8;
    var lines = [];
    var used = {};
    var max = Math.min(Math.max(count, 1), 20);

    if(!base){
      domainPreview.textContent = '请先填写通配基础域名，例如 a-hui-od.top';
      return;
    }

    while(lines.length < max){
      var label = randomLabel(length);
      if(used[label]){
        continue;
      }
      used[label] = true;
      lines.push((lines.length + 1) + '. https://' + label + '.' + base);
    }

    domainPreview.textContent = lines.join('\n');
  }

  function fillForm(config){
    siteName.value = config.siteName || '';
    wildcardEnabled.checked = !!(config.wildcard && config.wildcard.enabled !== false);
    baseDomain.value = (config.wildcard && config.wildcard.baseDomain) || '';
    candidateCount.value = (config.wildcard && config.wildcard.candidateCount) || 6;
    labelLength.value = (config.wildcard && config.wildcard.labelLength) || 8;
    assetThreshold.value = config.probeAssetThreshold || 2;
    probeAssets.value = (config.probeAssets || []).join('\n');
    var domainLines = (config.domains || []).map(function(d){
      return d.name ? d.url + ',' + d.name : d.url;
    });
    fixedDomains.value = domainLines.join('\n');
    jsonView.textContent = JSON.stringify(config, null, 2);
    toggleWildcard();
    refreshPreview();
  }

  function collectConfig(){
    var domains = linesToArray(fixedDomains.value).map(function(line, i){
      var parts = line.split(',');
      var url = parts[0].trim();
      var name = (parts[1] || '').trim() || ('线路' + (i + 1));
      return { url: url, name: name, provider: 'manual' };
    });
    return {
      siteName: siteName.value.trim() || '独立跳转站',
      wildcard: {
        enabled: wildcardEnabled.checked,
        baseDomain: baseDomain.value.trim(),
        candidateCount: parseInt(candidateCount.value, 10) || 6,
        labelLength: parseInt(labelLength.value, 10) || 8
      },
      probeAssets: linesToArray(probeAssets.value),
      probeAssetThreshold: parseInt(assetThreshold.value, 10) || 2,
      domains: domains
    };
  }

  function loadConfig(){
    setStatus('正在加载配置...');
    fetch('/api/config?t=' + Date.now(), {cache:'no-store'})
      .then(function(resp){
        if(!resp.ok){ throw new Error('HTTP ' + resp.status); }
        return resp.json();
      })
      .then(function(data){
        fillForm(data);
        setStatus('配置已加载');
      })
      .catch(function(err){
        setStatus('加载失败: ' + err.message, true);
      });
  }

  function saveConfig(){
    var config = collectConfig();
    if(config.wildcard.enabled && !config.wildcard.baseDomain){
      setStatus('通配模式已开启，请填写基础域名', true);
      return;
    }
    if(!config.wildcard.enabled && config.domains.length === 0){
      setStatus('通配模式已关闭，请至少添加一个固定域名', true);
      return;
    }
    if(config.probeAssets.length === 0){
      setStatus('请至少填写一个站点专属资源路径', true);
      return;
    }
    setStatus('正在保存配置...');
    fetch('/api/config', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(config)
    }).then(function(resp){
      if(!resp.ok){ throw new Error('HTTP ' + resp.status); }
      return resp.json();
    }).then(function(data){
      if(!data.ok){ throw new Error(data.message || '保存失败'); }
      fillForm(data.config);
      setStatus('配置保存成功');
    }).catch(function(err){
      setStatus('保存失败: ' + err.message, true);
    });
  }

  saveBtn.addEventListener('click', saveConfig);
  reloadBtn.addEventListener('click', loadConfig);
  [baseDomain, candidateCount, labelLength].forEach(function(input){
    input.addEventListener('input', refreshPreview);
  });
  loadConfig();
})();
</script>
</body>
</html>
